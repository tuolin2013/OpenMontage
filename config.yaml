# OpenMontage - Global Configuration

llm:
  provider: right.codes          # right.codes | anthropic | openai | gemini | openrouter | ollama | mistral | minimax
  model: null                    # null = use provider default; right.codes supports all major models
  base_url: https://www.right.codes/codex/v1   # OpenAI-compatible base URL (used when provider = right.codes or openrouter)
  api_key_env: LLM_API_KEY       # env var that holds the API key (LLM_API_KEY for right.codes)
  temperature: 0.7
  max_tokens: 4096

budget:
  mode: warn                     # observe | warn | cap
  total_usd: 10.00
  reserve_pct: 0.10              # holdback for retries / cleanup
  single_action_approval_usd: 0.50
  require_approval_for_new_paid_tool: true

checkpoint:
  policy: guided                 # guided | manual_all | auto_noncreative
  storage_dir: pipeline          # relative to project root

output:
  default_format: mp4
  default_codec: libx264
  default_audio_codec: aac
  default_resolution: "1920x1080"
  default_fps: 30
  default_crf: 23

paths:
  pipeline_dir: pipeline
  library_dir: library
  styles_dir: styles
  skills_dir: skills
  output_dir: output
